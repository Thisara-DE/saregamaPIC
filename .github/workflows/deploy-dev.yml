name: Deploy Dev

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

permissions:
  contents: read

concurrency:
  group: railway-development
  cancel-in-progress: true

jobs:
  deploy:
    if: >-
      ${{ github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' }}
    runs-on: ubuntu-latest
    environment:
      name: development
      url: ${{ vars.APP_URL }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install Railway CLI
        run: npm install --global @railway/cli
      - name: Deploy tested commit to Railway Dev
        run: >-
          railway up --ci
          --project "$RAILWAY_PROJECT_ID"
          --service "$RAILWAY_SERVICE_ID"
          --environment "$RAILWAY_ENVIRONMENT_ID"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE_ID: ${{ vars.RAILWAY_SERVICE_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ vars.RAILWAY_ENVIRONMENT_ID }}
      - name: Verify Dev health
        run: curl --fail --retry 8 --retry-delay 5 "${APP_URL%/}/api/health"
        env:
          APP_URL: ${{ vars.APP_URL }}
